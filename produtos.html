<script src="MixTudo.js"></script>
<script>
function filtrar(categoria) {
  document.querySelectorAll('.mix-produto').forEach(p => {
    p.style.display = (categoria === 'todos' || p.classList.contains(categoria)) ? 'block' : 'none';
  });
  document.querySelectorAll('.mix-filtros button').forEach(b => {
    b.classList.toggle('ativo', b.textContent.trim().toLowerCase() === categoria || (categoria === 'todos' && b.textContent.trim() === 'Todos'));
  });
}
</script>
